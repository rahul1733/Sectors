var map=L.map('map').setView([25.2138,75.8648],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);

function getColor(ms){
if(ms<30) return "#ff4d4d";
if(ms<40) return "#ffd600";
return "#00c853";
}

function onEach(feature,layer){
var name=feature.properties.name;
var d=sectorData[name];
if(!d) return;

layer.setStyle({
color:"#333",
weight:1,
fillOpacity:0.7,
fillColor:getColor(d.pp_ms)
});

layer.bindTooltip(name,{permanent:true,className:"label",direction:"center"});

var popup=`
<b>Sector :</b> ${d.sector}<br>
<b>SH :</b> ${d.sh}<br>
<b>ASM :</b> ${d.asm}<hr>

<b>MSIM Atteck :</b> ${d.atteck}<br>
<b>SSD-RE1 :</b> ${d.ssd}<br>
<b>Winback :</b> ${d.winback}<br>
<b>VPA MSIM :</b> ${d.vpa}<hr>

<b>Industry Txn :</b> ${d.industry}<br>
<b>PhonePe Txn :</b> ${d.phonepe}<br>
<b>Paytm Txn :</b> ${d.paytm}<hr>

<b>PhonePe MS :</b> ${d.pp_ms}%<br>
<b>Paytm MS :</b> ${d.ptm_ms}<br>

<b>Txn Needed +2% :</b> ${d.need}
`;

layer.bindPopup(popup);
layer.asm=d.asm;
}

var geoLayer=L.geoJSON(geo,{onEachFeature:onEach}).addTo(map);

document.getElementById("asmFilter").addEventListener("change",function(){
var val=this.value;

geoLayer.eachLayer(function(l){
if(val=="All") map.addLayer(l);
else{
if(l.asm==val) map.addLayer(l);
else map.removeLayer(l);
}
});
});

// Stable live location
var userMarker=null;

function getLocation(){
if(navigator.geolocation){
navigator.geolocation.watchPosition(function(pos){
var lat=pos.coords.latitude;
var lon=pos.coords.longitude;

if(userMarker){
userMarker.setLatLng([lat,lon]);
}else{
userMarker=L.circleMarker([lat,lon],{
radius:18,
color:"#007bff",
fillColor:"#007bff",
fillOpacity:0.9
}).addTo(map).bindPopup("You are here");
}

map.setView([lat,lon],14);

});
}
}

<script>
function detectDevice(){
var isMobile=/Android|iPhone|iPad|Mobile/i.test(navigator.userAgent);
if(isMobile){
document.querySelectorAll('.leaflet-popup-content').forEach(e=>e.style.fontSize="22px");
}else{
document.querySelectorAll('.leaflet-popup-content').forEach(e=>e.style.fontSize="18px");
}
}

function createSummary(){
var bar=document.createElement("div");
bar.id="summaryBar";
bar.innerHTML="Loading summary...";
document.body.appendChild(bar);
updateSummary("All");
}

function updateSummary(asm){
var total=0,red=0,yellow=0,green=0;
var industry=0,pp=0,pt=0;

for(var s in sectorData){
var d=sectorData[s];
if(asm!="All" && d.asm!=asm) continue;

total++;
industry+=d.industry;
pp+=d.phonepe;
pt+=d.paytm;

if(d.pp_ms<30) red++;
else if(d.pp_ms<40) yellow++;
else green++;
}

var txt="Total:"+total+" | 🔴"+red+" | 🟡"+yellow+" | 🟢"+green+" | Industry:"+industry+" | PhonePe:"+pp+" | Paytm:"+pt;
document.getElementById("summaryBar").innerHTML=txt;
}

document.addEventListener("DOMContentLoaded",function(){
detectDevice();
createSummary();

var f=document.getElementById("asmFilter");
if(f){
f.addEventListener("change",function(){
updateSummary(this.value);
});
}
});
</script>

</body>
</html>
